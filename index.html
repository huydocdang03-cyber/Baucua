<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:url("bg.jpg") center/cover;}
#login{text-align:center;margin-top:100px;}
.panel{background:black;color:white;padding:10px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<div id="login">
<input id="username" placeholder="user"><br>
<input id="password" type="password" placeholder="pass"><br>
<button onclick="login()">Login</button>
<p id="err"></p>
</div>

<div id="game" style="display:none;">

<h2 id="dealer"></h2>
<h3 id="timer"></h3>
<h3 id="money"></h3>
<h2 id="dice">🎲 🎲 🎲</h2>

<!-- ADMIN -->
<div id="adminPanel" class="panel" style="display:none;">
<input id="adminResult" placeholder="Bầu,Cua,Tôm">
<button onclick="setResult()">Set</button>
<p id="preview"></p>
</div>

<!-- BANKER -->
<div id="bankerPanel" class="panel" style="display:none;">
<input id="user"><input id="chip">
<button onclick="add()">+</button>
<button onclick="sub()">-</button>

<h4>Chọn Dealer</h4>
<div id="userList"></div>
</div>

<!-- DEALER -->
<div id="dealerPanel" class="panel" style="display:none;">
<input id="min"><input id="max">
<button onclick="setLimit()">Set cược</button>
<button onclick="openResult()">Mở</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// LOGIN
function login(){
    socket.emit("login",{
        username:username.value,
        password:password.value
    });
}

socket.on("login_success",(d)=>{
    login.style.display="none";
    game.style.display="block";

    if(d.role==="admin") adminPanel.style.display="block";
    if(d.role==="banker") bankerPanel.style.display="block";
});

// USERS
socket.on("users",(u)=>{
    let html="";

    for(let id in u){
        html+=u[id].username+
        ` <button onclick="setDealer('${u[id].username}')">Chọn</button><br>`;
    }

    userList.innerHTML=html;

    let me=u[socket.id];
    if(me) money.innerText="💰 "+me.money;
});

// DEALER
socket.on("dealer",(d)=>{
    dealer.innerText="👑 "+d;
});

// TIMER
socket.on("countdown",(t)=>{
    timer.innerText="⏱️ "+t;
});

// ADMIN AUTO XEM
socket.on("admin_result",(r)=>{
    if(!r) return;
    preview.innerText="🎯 "+r.join(" - ");
});

// RESULT
socket.on("dice_result",(r)=>{
    dice.innerText=r;
});

// FUNCTIONS
function setDealer(n){socket.emit("set_dealer",n);}
function setResult(){socket.emit("admin_set",adminResult.value);}
function add(){socket.emit("add_chip",{user:user.value,chip:+chip.value});}
function sub(){socket.emit("sub_chip",{user:user.value,chip:+chip.value});}
function setLimit(){socket.emit("set_limit",{min:+min.value,max:+max.value});}
function openResult(){socket.emit("open_result");}
</script>

</body>
</html>
